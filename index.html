<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Slider</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1 class="title">Image Slider</h1>

<div class="slider-container">
  <button onclick="prevSlide()">❮</button>

  <div class="slider">
    <div class="slides" id="slides">
      <img src="https://picsum.photos/id/1015/500/300">
      <img src="https://picsum.photos/id/1016/500/300">
      <img src="https://picsum.photos/id/1018/500/300">
    </div>
  </div>

  <button onclick="nextSlide()">❯</button>
</div>

<!-- REAL SLIDER -->
<input type="range" id="range" min="0" max="2" step="0.01" value="0">

<script src="script.js"></script>
</body>
</html>
